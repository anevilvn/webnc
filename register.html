<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="blur-3xl">
    <div class="flex justify-center w-full h-full">
        <div class="w-1/3 h-20">
            <h1 class="text-5xl font-bold to-blue-400 py-4 text-center">Register</h1>
            <form action="/register" method="post" onsubmit="return handleSubmit(event)">
                <input type="text" id="username" name="username" class="w-full h-10 border-2 border-blue-300 rounded-lg my-2 px-4" placeholder="Username">
                <input type="text" id="email" name="email" class="w-full h-10 border-2 border-blue-300 rounded-lg my-2 px-4" placeholder="Email">
                <input type="password" id="password" name="password" class="w-full h-10 border-2 border-blue-300 rounded-lg my-2 px-4" placeholder="Password">
                <input type="password" id="confirmPassword" name="confirmPassword" class="w-full h-10 border-2 border-blue-300 rounded-lg my-2 px-4" placeholder="Confirm Password">
                <button type="submit" class="w-full h-10 bg-blue-400 text-white rounded-lg my-2">Register</button>
            </form>
        </div>
    </div>

    <script>
        function handleSubmit(event) {
            event.preventDefault();
            
            const formData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                confirmPassword: document.getElementById('confirmPassword').value
            };
    
            fetch('/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            }).then(response => {
                if (response.ok) {
                    console.log('Dữ liệu đã được gửi thành công!');
                }
            }).catch(error => console.error('Lỗi:', error));
        }
    </script>
    
</body>
</html>
